# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "README/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "README/**"

jobs:
  test:
    name: 테스트 실행
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

      - name: Upload coverage & logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            coverage
            logs

  deploy:
    name: EC2 배포
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: DIST_VER 버전 업
        run: |
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('verseion.json', 'utf8'));
            const parts = v.DIST_VER.split('.');
            parts[3] = String(Number(parts[3]) + 1);
            v.DIST_VER = parts.join('.');
            fs.writeFileSync('verseion.json', JSON.stringify(v, null, '\t') + '\n');
            console.log('DIST_VER:', v.DIST_VER);
          "

      - name: 버전 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add verseion.json
          git commit -m "chore: bump DIST_VER [skip ci]"
          git push

      - name: SSH로 EC2 접속 후 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.EC2_APP_DIR }}
            sudo git pull origin main
            sudo pnpm install --frozen-lockfile
            sudo pnpm run build
            sudo pnpm start
